.show-detail-cast .cast-member-character { font-size: 10px; color: var(--text-muted); line-height: 1.3; }
.show-episodes-loading { text-align: center; padding: 30px; color: var(--text-muted); }

/* iPhone safe area & larger screens */
@supports (padding-top: env(safe-area-inset-top)) {
    .top-nav { padding-top: env(safe-area-inset-top); height: calc(48px + env(safe-area-inset-top)); }
    .date-header { top: calc(48px + env(safe-area-inset-top)); }
    main { padding-bottom: calc(80px + env(safe-area-inset-bottom)); }
}

@media (min-width: 500px) {
    .top-nav { padding: 0 20px; height: 52px; }
    .nav-logo { font-size: 18px; }
    .logo-icon { font-size: 24px; }
    .tab-label { display: inline; }
    .nav-tab { padding: 7px 14px; font-size: 14px; }
    main { padding: 16px; }
    .upcoming-header h1, .shows-header h1, .watched-header h1, .explore-header h1 { font-size: 24px; }
    .shows-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
    .show-card-name { font-size: 13px; }
    .episode-poster, .episode-poster-placeholder { width: 60px; height: 90px; }
    .episode-show-name { font-size: 15px; }
    .show-detail-hero { height: 220px; }
    .show-detail-hero-info { left: 130px; }
    .show-detail-hero-name { font-size: 22px; }
    .show-detail-poster, .show-detail-poster-placeholder { width: 100px; height: 150px; }
    .show-detail-poster-wrap { bottom: -35px; left: 20px; }
    .show-detail-body { padding: 20px; padding-top: 50px; }
    .show-detail-info-grid { grid-template-columns: repeat(4, 1fr); }
    .date-header { top: 52px; }
}

@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.episode-card, .show-card, .watched-card { animation: fadeIn 0.3s ease forwards; }

/* ===== Watched Toggle Button on Episode Rows ===== */
.show-episode-item {
    position: relative;
    padding-right: 48px; /* space for toggle button */
}
.episode-watched-toggle {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    width: 32px;
    height: 32px;
    border: 2px solid var(--border-color);
    border-radius: 50%;
    background: transparent;
    color: var(--text-muted);
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
    flex-shrink: 0;
    z-index: 2;
    padding: 0;
    line-height: 1;
}
.episode-watched-toggle:hover {
    border-color: var(--accent-secondary);
    color: var(--accent-secondary);
}
.episode-watched-toggle.watched {
    background: var(--accent-secondary);
    border-color: var(--accent-secondary);
    color: #fff;
}
.episode-watched-toggle.watched:hover {
    background: #2ea043;
    border-color: #2ea043;
}
.show-episode-item.watched-episode {
    opacity: 0.65;
}
.show-episode-item.watched-episode:hover {
    opacity: 0.85;
}

/* ===== Show Detail Watched Progress ===== */
.show-watched-progress {
    margin-bottom: 18px;
    padding: 12px 14px;
    background: var(--bg-card);
    border-radius: var(--radius-sm);
    border: 1px solid var(--border-subtle);
}
.show-watched-progress-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
}
.show-watched-progress-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
}
.show-watched-progress-count {
    font-size: 12px;
    color: var(--text-secondary);
}
.show-watched-bar {
    width: 100%;
    height: 6px;
    background: var(--border-color);
    border-radius: 3px;
    overflow: hidden;
}
.show-watched-bar-fill {
    height: 100%;
    background: var(--accent-secondary);
    border-radius: 3px;
    transition: width 0.3s ease;
    min-width: 0;
}

/* ===== Show Card Mini Progress ===== */
.show-card-progress {
    margin-top: 4px;
    height: 3px;
    background: var(--border-color);
    border-radius: 2px;
    overflow: hidden;
}
.show-card-progress-fill {
    height: 100%;
    background: var(--accent-secondary);
    border-radius: 2px;
    transition: width 0.3s ease;
}
.show-card-watched-count {
    font-size: 10px;
    color: var(--accent-secondary);
    margin-top: 2px;
}

/* ===== Watched Tab Updates ===== */
.watched-toggle-btn {
    width: 28px;
    height: 28px;
    border: 2px solid var(--border-color);
    border-radius: 50%;
    background: transparent;
    color: var(--text-muted);
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
    flex-shrink: 0;
    margin-left: auto;
    padding: 0;
    line-height: 1;
}
.watched-toggle-btn.watched {
    background: var(--accent-secondary);
    border-color: var(--accent-secondary);
    color: #fff;
}
.watched-toggle-btn:hover {
    border-color: var(--accent-secondary);
    color: var(--accent-secondary);
}
.watched-toggle-btn.watched:hover {
    background: #2ea043;
    border-color: #2ea043;
}
.watched-card.watched-episode-card {
    opacity: 0.7;
}

/* ===== Episode Detail Watched Toggle ===== */
.episode-detail-watched-toggle {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    margin-bottom: 12px;
    font-family: inherit;
    border: 2px solid var(--border-color);
    background: transparent;
    color: var(--text-secondary);
}
.episode-detail-watched-toggle:hover {
    border-color: var(--accent-secondary);
    color: var(--accent-secondary);
}
.episode-detail-watched-toggle.watched {
    background: var(--accent-secondary);
    border-color: var(--accent-secondary);
    color: #fff;
}
.episode-detail-watched-toggle.watched:hover {
    background: #2ea043;
    border-color: #2ea043;
}

    </style>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📺</text></svg>">
</head>
<body>
    <!-- Top Navigation -->
    <nav class="top-nav">
        <div class="nav-logo">
            <span class="logo-icon">📺</span>
            <span class="logo-text">TV Time</span>
        </div>
        <div class="nav-tabs">
            <button class="nav-tab active" data-tab="upcoming">
                <span class="tab-icon">📅</span>
                <span class="tab-label">Upcoming</span>
            </button>
            <button class="nav-tab" data-tab="explore">
                <span class="tab-icon">🔍</span>
                <span class="tab-label">Explore</span>
            </button>
            <button class="nav-tab" data-tab="shows">
                <span class="tab-icon">📚</span>
                <span class="tab-label">My Shows</span>
            </button>
            <button class="nav-tab" data-tab="watched">
                <span class="tab-icon">✅</span>
                <span class="tab-label">Watched</span>
            </button>
        </div>
        <div class="nav-actions">
            <button class="btn-icon" id="refreshBtn" title="Refresh data">🔄</button>
            <button class="btn-icon" id="settingsBtn" title="Settings">⚙️</button>
        </div>
    </nav>

    <!-- Main Content -->
    <main id="mainContent">
        <!-- Upcoming Tab -->
        <section id="upcomingTab" class="tab-content active">
            <div class="upcoming-header">
                <h1>Upcoming Episodes</h1>
                <div class="upcoming-controls">
                    <div class="filter-group">
                        <button class="filter-btn active" data-filter="all">All</button>
                        <button class="filter-btn" data-filter="week">This Week</button>
                        <button class="filter-btn" data-filter="today">Today</button>
                    </div>
                    <div class="date-nav">
                        <button class="btn-icon" id="scrollPrevWeek">◀</button>
                        <span id="dateRangeLabel">Upcoming</span>
                        <button class="btn-icon" id="scrollNextWeek">▶</button>
                    </div>
                </div>
            </div>
            <div id="timelineContainer" class="timeline">
                <div class="loading-spinner">
                    <div class="spinner"></div>
                    <p>Loading upcoming episodes...</p>
                </div>
            </div>
        </section>

        <!-- Explore Tab -->
        <section id="exploreTab" class="tab-content">
            <div class="explore-header">
                <h1>Explore</h1>
                <div class="explore-controls">
                    <input type="text" id="exploreSearch" class="search-input" placeholder="Search shows...">
                    <div class="filter-group" id="exploreFilterGroup">
                        <button class="filter-btn active" data-explore="trending">🔥 Trending</button>
                        <button class="filter-btn" data-explore="popular">⭐ Popular</button>
                    </div>
                </div>
            </div>
            <div id="exploreGrid" class="shows-grid">
                <div class="loading-spinner">
                    <div class="spinner"></div>
                    <p>Loading trending shows...</p>
                </div>
            </div>
            <div class="explore-load-more" id="exploreLoadMore" style="display:none;">
                <button class="btn-primary" id="loadMoreBtn">Load More</button>
            </div>
        </section>

        <!-- Shows Tab -->
        <section id="showsTab" class="tab-content">
            <div class="shows-header">
                <h1>My Shows</h1>
                <div class="shows-controls">
                    <input type="text" id="showSearch" class="search-input" placeholder="Search shows...">
                    <span class="show-count" id="showCount">62 shows</span>
                </div>
            </div>
            <div id="showsGrid" class="shows-grid">
                <div class="loading-spinner">
                    <div class="spinner"></div>
                    <p>Loading shows...</p>
                </div>
            </div>
        </section>

        <!-- Watched Tab -->
        <section id="watchedTab" class="tab-content">
            <div class="watched-header">
                <h1>Recently Watched</h1>
                <span id="watchedCount" class="show-count"></span>
            </div>
            <div id="watchedList" class="watched-list">
                <div class="loading-spinner">
                    <div class="spinner"></div>
                    <p>Loading watched episodes...</p>
                </div>
            </div>
        </section>
    </main>

    <!-- Show Detail Modal -->
    <div id="showDetailModal" class="modal">
        <div class="modal-backdrop"></div>
        <div class="modal-content modal-show-detail">
            <button class="modal-close" id="showDetailClose">✕</button>
            <div id="showDetailContent" class="show-detail-content">
                <!-- Populated by JS -->
            </div>
        </div>
    </div>

    <!-- Episode Detail Modal -->
    <div id="episodeModal" class="modal">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
            <button class="modal-close" id="modalClose">✕</button>
            <div id="episodeDetail" class="episode-detail">
                <!-- Populated by JS -->
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal">
        <div class="modal-backdrop"></div>
        <div class="modal-content modal-sm">
            <button class="modal-close" id="settingsClose">✕</button>
            <h2>Settings</h2>
            <div class="settings-form">
                <label for="apiKey">TMDB API Key</label>
                <input type="text" id="apiKey" class="search-input" placeholder="Enter your TMDB API key (v3 auth)">
                <p class="help-text">Get a free API key at <a href="https://www.themoviedb.org/settings/api" target="_blank">themoviedb.org</a></p>
                <label for="anthropicKey">DeepSeek API Key <span style="font-weight:400;color:var(--text-muted);">(for AI show research)</span></label>
                <input type="password" id="anthropicKey" class="search-input" placeholder="sk-...">
                <label for="cacheHours">Cache Duration (hours)</label>
                <select id="cacheHours" class="search-input">
                    <option value="1">1 hour</option>
                    <option value="6" selected>6 hours</option>
                    <option value="24">24 hours</option>
                </select>
                <button id="saveSettings" class="btn-primary">Save Settings</button>
                <button id="clearCache" class="btn-secondary">Clear Cache</button>
            </div>
        </div>
    </div>

    <script src="js/store.js"></script>
    <script src="js/shows-data.js"></script>
    <script src="js/tmdb.js"></script>
    <script src="js/anthropic.js"></script>
    <script src="js/app.js"></script>
    <script>
        // Register service worker for offline PWA support
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(function(reg) {
                console.log('[SW] Registered:', reg.scope);
            }).catch(function(err) {
                console.warn('[SW] Registration failed:', err);
            });
        }
    </script>
</body>
